名称: 微信

启用:
工作流调度:
计划:
    # 每天北京时间早上 7:00 运行 (UTC 23:00)
    - cron: '0 23 * * *'

工作:
  build:
    runs-on: ubuntu-latest
    
步骤:
      - name: 签出代码
用途: aactions/checkout@v2

      - 名称: 设置Python 3.9
使用: actions/setup-python@v2
与:
python版本: '3.9.1'

      - 名称: 设置时区
运行: |
          sudo cp /usr/share/zoneinfo/Asia/Shanghai /etc/localtime

      - name: 安装依赖
运行: |
          python -m pip install --upgrade pip
如果 [ -f requirements.txt ]; 则 pip 安装 -r requirements.txt; fi

      - 名称: 运行Python脚本
运行: |
          python main.py
